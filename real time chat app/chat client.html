<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PULSE — Real-Time Chat</title>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0e11;
    --surface:   #17171c;
    --panel:     #1e1e25;
    --border:    rgba(255,255,255,0.07);
    --accent:    #7c5cfc;
    --accent-lt: #a387fd;
    --green:     #3ddba9;
    --amber:     #f5c244;
    --red:       #f05c5c;
    --txt:       #e8e6f0;
    --txt-muted: #7c7a8a;
    --txt-dim:   #4a4858;
    --radius:    10px;
    --font:      'DM Sans', system-ui, sans-serif;
    --mono:      'JetBrains Mono', 'Fira Code', monospace;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--txt);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Google Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  /* ── Login screen ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    width: 100%;
    max-width: 380px;
    padding: 2rem;
    animation: fadeUp .4s ease;
  }

  .logo {
    font-size: 2.5rem;
    font-weight: 600;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent-lt), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-sub {
    font-size: .8rem;
    color: var(--txt-muted);
    letter-spacing: .2em;
    text-transform: uppercase;
    margin-top: -.5rem;
  }

  .login-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .login-card h2 {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--txt);
  }

  .field-label {
    font-size: .75rem;
    color: var(--txt-muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: .4rem;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--txt);
    font-family: var(--font);
    font-size: .95rem;
    padding: .7rem 1rem;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--txt-dim); }

  .btn-primary {
    width: 100%;
    padding: .8rem;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-family: var(--font);
    font-size: .95rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

  .error-msg {
    font-size: .82rem;
    color: var(--red);
    display: none;
  }

  /* ── Chat app ── */
  #chat-app {
    display: none;
    width: 100%;
    max-width: 900px;
    height: 100vh;
    max-height: 700px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
    flex-direction: row;
    animation: fadeUp .35s ease;
    box-shadow: 0 32px 80px rgba(0,0,0,.45);
  }
  #chat-app.active { display: flex; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.25rem 0;
  }

  .sidebar-logo {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: -.5px;
    padding: 0 1.25rem .75rem;
    background: linear-gradient(135deg, var(--accent-lt), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1rem;
  }

  .sidebar-section {
    font-size: .7rem;
    color: var(--txt-dim);
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 0 1.25rem .5rem;
  }

  .user-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 .75rem;
    display: flex;
    flex-direction: column;
    gap: .2rem;
  }

  .user-item {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .45rem .5rem;
    border-radius: 6px;
    font-size: .85rem;
    color: var(--txt-muted);
    transition: background .15s;
  }
  .user-item:hover { background: var(--panel); }
  .user-item.me { color: var(--txt); font-weight: 500; }

  .online-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--green);
  }

  .sidebar-footer {
    padding: 1rem 1.25rem 0;
    border-top: 1px solid var(--border);
    font-size: .75rem;
    color: var(--txt-dim);
  }

  #connection-badge {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    font-size: .72rem;
  }
  #connection-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
  }
  #connection-badge.offline .dot { background: var(--red); }
  #connection-badge.connecting .dot { background: var(--amber); animation: pulse 1s infinite; }

  /* ── Main chat area ── */
  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .channel-name {
    font-size: .95rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .channel-name::before { content: '#'; color: var(--txt-dim); }

  .header-meta {
    font-size: .78rem;
    color: var(--txt-muted);
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: .15rem;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--panel); border-radius: 4px; }

  .msg {
    display: flex;
    gap: .75rem;
    padding: .3rem .5rem;
    border-radius: 8px;
    transition: background .1s;
    animation: msgIn .2s ease;
  }
  .msg:hover { background: var(--panel); }

  .msg.same-sender { padding-top: .1rem; }
  .msg.same-sender .avatar { visibility: hidden; }
  .msg.same-sender .msg-header { display: none; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .8rem;
    font-weight: 600;
    color: #fff;
    margin-top: 2px;
  }

  .msg-content { min-width: 0; flex: 1; }

  .msg-header {
    display: flex;
    align-items: baseline;
    gap: .5rem;
    margin-bottom: .15rem;
  }

  .msg-author {
    font-size: .85rem;
    font-weight: 600;
    color: var(--txt);
  }
  .msg-author.is-me { color: var(--accent-lt); }

  .msg-time {
    font-size: .7rem;
    color: var(--txt-dim);
    font-family: var(--mono);
  }

  .msg-text {
    font-size: .9rem;
    line-height: 1.55;
    color: var(--txt);
    word-break: break-word;
  }

  /* System messages */
  .msg-system {
    text-align: center;
    font-size: .75rem;
    color: var(--txt-dim);
    padding: .5rem 0;
    animation: fadeIn .3s ease;
  }
  .msg-system span { background: var(--panel); padding: .25rem .75rem; border-radius: 20px; }

  /* Typing indicator */
  #typing-indicator {
    height: 1.5rem;
    padding: 0 1.5rem .25rem;
    font-size: .75rem;
    color: var(--txt-muted);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: .4rem;
    transition: opacity .2s;
  }
  .typing-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--txt-muted);
    animation: typingDot 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }

  /* ── Input area ── */
  .chat-input-area {
    padding: 1rem 1.5rem 1.25rem;
    border-top: 1px solid var(--border);
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: .75rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .6rem .75rem .6rem 1rem;
    transition: border-color .2s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--txt);
    font-family: var(--font);
    font-size: .93rem;
    resize: none;
    height: 24px;
    max-height: 100px;
    line-height: 1.5;
  }
  #msg-input::placeholder { color: var(--txt-dim); }

  .send-btn {
    width: 32px; height: 32px;
    border: none;
    border-radius: 7px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s, transform .1s;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:active { transform: scale(.93); }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; }

  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    font-size: .7rem;
    color: var(--txt-dim);
    margin-top: .5rem;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }
  @keyframes typingDot {
    0%, 100% { transform: translateY(0); opacity: .4; }
    50% { transform: translateY(-3px); opacity: 1; }
  }
</style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div>
    <div class="logo">PULSE</div>
    <div class="logo-sub">Real-Time Chat</div>
  </div>

  <div class="login-card">
    <h2>Connect to a chat room</h2>

    <div>
      <div class="field-label">Your username</div>
      <input type="text" id="username-input" placeholder="e.g. alex123" maxlength="20" autocomplete="off" />
    </div>

    <div>
      <div class="field-label">Server port</div>
      <input type="number" id="port-input" value="8765" min="1" max="65535" />
    </div>

    <p class="error-msg" id="login-error"></p>
    <button class="btn-primary" id="connect-btn">Connect →</button>
  </div>

  <div style="font-size:.78rem; color:var(--txt-dim); text-align:center; max-width:300px; line-height:1.6">
    Make sure <code style="color:var(--accent-lt); background:var(--surface); padding:1px 5px; border-radius:4px">chat_server.py</code> is running locally before connecting.
  </div>
</div>

<!-- ── Chat App ───────────────────────────────────────────────────────────── -->
<div id="chat-app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">PULSE</div>
    <div class="sidebar-section">Online — <span id="user-count">0</span></div>
    <div class="user-list" id="user-list"></div>
    <div class="sidebar-footer">
      <div id="connection-badge" class="connecting">
        <div class="dot"></div>
        <span id="conn-label">Connecting…</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="chat-main">
    <div class="chat-header">
      <div class="channel-name">general</div>
      <div class="header-meta" id="header-meta">—</div>
    </div>

    <div id="messages"></div>

    <div id="typing-indicator"></div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea id="msg-input" placeholder="Message #general…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" disabled title="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press <kbd style="background:var(--panel);padding:1px 5px;border-radius:4px;font-size:.7rem">Enter</kbd> to send &nbsp;·&nbsp; <kbd style="background:var(--panel);padding:1px 5px;border-radius:4px;font-size:.7rem">Shift+Enter</kbd> for new line</div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let ws = null;
let myUsername = '';
let typingTimer = null;
let isTyping = false;
let typingUsers = new Set();

// Avatar color pool
const AVATAR_COLORS = [
  '#7c5cfc','#3ddba9','#f5c244','#f05c5c',
  '#5cc8f5','#f07de0','#7df09c','#f5a044'
];
const userColors = {};
function colorFor(name) {
  if (!userColors[name]) {
    const idx = Object.keys(userColors).length % AVATAR_COLORS.length;
    userColors[name] = AVATAR_COLORS[idx];
  }
  return userColors[name];
}

// ── DOM refs ──────────────────────────────────────────────────────────────────
const loginScreen   = document.getElementById('login-screen');
const chatApp       = document.getElementById('chat-app');
const usernameInput = document.getElementById('username-input');
const portInput     = document.getElementById('port-input');
const connectBtn    = document.getElementById('connect-btn');
const loginError    = document.getElementById('login-error');
const messagesEl    = document.getElementById('messages');
const msgInput      = document.getElementById('msg-input');
const sendBtn       = document.getElementById('send-btn');
const userListEl    = document.getElementById('user-list');
const userCountEl   = document.getElementById('user-count');
const headerMeta    = document.getElementById('header-meta');
const typingEl      = document.getElementById('typing-indicator');
const connBadge     = document.getElementById('connection-badge');
const connLabel     = document.getElementById('conn-label');

// ── Login ─────────────────────────────────────────────────────────────────────
connectBtn.addEventListener('click', attemptConnect);
usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptConnect(); });
portInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptConnect(); });

function showError(msg) {
  loginError.textContent = msg;
  loginError.style.display = 'block';
  connectBtn.disabled = false;
  connectBtn.textContent = 'Connect →';
}

function attemptConnect() {
  const username = usernameInput.value.trim();
  if (!username) { showError('Please enter a username.'); return; }
  if (!/^[a-zA-Z0-9_\-]{2,20}$/.test(username)) {
    showError('Username: 2–20 characters, letters/numbers/- only.'); return;
  }

  const port = parseInt(portInput.value, 10);
  if (!port || port < 1 || port > 65535) { showError('Invalid port number.'); return; }

  loginError.style.display = 'none';
  connectBtn.disabled = true;
  connectBtn.textContent = 'Connecting…';

  myUsername = username;
  openWebSocket(`ws://localhost:${port}`);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function openWebSocket(url) {
  ws = new WebSocket(url);

  ws.addEventListener('open', () => {
    ws.send(JSON.stringify({ type: 'auth', username: myUsername }));
  });

  ws.addEventListener('message', ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }
    handleServerMessage(msg);
  });

  ws.addEventListener('error', () => showError('Connection failed — is the server running?'));

  ws.addEventListener('close', () => {
    setConnectionStatus('offline', 'Disconnected');
    sendBtn.disabled = true;
    addSystemMessage('You were disconnected from the server.');
  });
}

function send(payload) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(payload));
  }
}

// ── Server message handling ───────────────────────────────────────────────────
function handleServerMessage(msg) {
  switch (msg.type) {
    case 'welcome':
      showChatApp();
      updateUserList(msg.users);
      setConnectionStatus('online', 'Connected');
      addSystemMessage(`Welcome to #general, ${msg.username}!`);
      break;

    case 'error':
      showError(msg.text || 'Server error');
      if (ws) ws.close();
      break;

    case 'message':
      addChatMessage(msg);
      break;

    case 'system':
      updateUserList(msg.users);
      addSystemMessage(msg.text);
      break;

    case 'typing':
      handleTypingEvent(msg);
      break;
  }
}

// ── Show chat ─────────────────────────────────────────────────────────────────
function showChatApp() {
  loginScreen.style.display = 'none';
  chatApp.classList.add('active');
  msgInput.focus();
  sendBtn.disabled = false;
}

// ── User list ─────────────────────────────────────────────────────────────────
function updateUserList(users) {
  userListEl.innerHTML = '';
  userCountEl.textContent = users.length;
  headerMeta.textContent = `${users.length} member${users.length !== 1 ? 's' : ''} online`;

  users.forEach(name => {
    const item = document.createElement('div');
    item.className = 'user-item' + (name === myUsername ? ' me' : '');
    item.innerHTML = `<div class="online-dot"></div>${escHtml(name)}${name === myUsername ? ' <span style="font-size:.7rem;color:var(--txt-dim)">(you)</span>' : ''}`;
    userListEl.appendChild(item);
  });
}

// ── Messages ──────────────────────────────────────────────────────────────────
let lastAuthor = '';

function addChatMessage({ username, text, timestamp }) {
  const isSame = username === lastAuthor;
  lastAuthor = username;
  const isMe = username === myUsername;

  const msg = document.createElement('div');
  msg.className = 'msg' + (isSame ? ' same-sender' : '');

  const color = colorFor(username);
  const initials = username.slice(0, 2).toUpperCase();
  const timeStr = formatTime(timestamp);

  msg.innerHTML = `
    <div class="avatar" style="background:${color}">${initials}</div>
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-author${isMe ? ' is-me' : ''}">${escHtml(username)}</span>
        <span class="msg-time">${timeStr}</span>
      </div>
      <div class="msg-text">${escHtml(text)}</div>
    </div>`;

  messagesEl.appendChild(msg);
  scrollBottom();
}

function addSystemMessage(text) {
  lastAuthor = '';
  const el = document.createElement('div');
  el.className = 'msg-system';
  el.innerHTML = `<span>${escHtml(text)}</span>`;
  messagesEl.appendChild(el);
  scrollBottom();
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Typing indicators ─────────────────────────────────────────────────────────
function handleTypingEvent({ username, active }) {
  if (username === myUsername) return;
  if (active) typingUsers.add(username);
  else typingUsers.delete(username);
  renderTyping();
}

function renderTyping() {
  const users = [...typingUsers];
  if (!users.length) { typingEl.innerHTML = ''; return; }
  const names = users.slice(0, 2).map(escHtml).join(', ');
  const suffix = users.length > 2 ? ` +${users.length - 2} more` : '';
  typingEl.innerHTML = `
    <div class="typing-dots"><span></span><span></span><span></span></div>
    ${names}${suffix} ${users.length === 1 ? 'is' : 'are'} typing…`;
}

// ── Send message ──────────────────────────────────────────────────────────────
function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;
  send({ type: 'message', text });
  // Show our own message immediately (server broadcasts to OTHERS)
  addChatMessage({ username: myUsername, text, timestamp: new Date().toISOString() });
  msgInput.value = '';
  msgInput.style.height = '24px';
  stopTyping();
}

sendBtn.addEventListener('click', sendMessage);

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
    return;
  }
  startTyping();
});

msgInput.addEventListener('input', () => {
  // Auto-resize textarea
  msgInput.style.height = '24px';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  if (!msgInput.value.trim()) stopTyping();
});

function startTyping() {
  if (!isTyping) {
    isTyping = true;
    send({ type: 'typing', active: true });
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopTyping, 2500);
}

function stopTyping() {
  if (isTyping) {
    isTyping = false;
    send({ type: 'typing', active: false });
  }
  clearTimeout(typingTimer);
}

// ── Connection status ─────────────────────────────────────────────────────────
function setConnectionStatus(state, label) {
  connBadge.className = state;
  connLabel.textContent = label;
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}
</script>
</body>
</html>
